<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14141a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a22;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#26262b"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.5"/>

  <!-- Main Title - Centered -->
  <text x="600" y="220" font-family="Helvetica, Arial, sans-serif" font-size="80" font-weight="bold" fill="#f2f2f7" text-anchor="middle">MacTalk</text>

  <!-- Tagline -->
  <text x="600" y="280" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#9999a6" text-anchor="middle">Voice Transcription. Locally. Privately.</text>

  <!-- Feature Pills -->
  <g id="feature-pills">
    <!-- Pill 1: Metal -->
    <rect x="200" y="350" width="180" height="50" rx="25" fill="#26262b" stroke="#404045" stroke-width="1"/>
    <text x="290" y="383" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#33b34d" text-anchor="middle" font-weight="600">Metal Accelerated</text>

    <!-- Pill 2: Privacy -->
    <rect x="410" y="350" width="150" height="50" rx="25" fill="#26262b" stroke="#404045" stroke-width="1"/>
    <text x="485" y="383" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#f2f2f7" text-anchor="middle" font-weight="600">100% Local</text>

    <!-- Pill 3: Real-time -->
    <rect x="590" y="350" width="150" height="50" rx="25" fill="#26262b" stroke="#404045" stroke-width="1"/>
    <text x="665" y="383" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#6699ff" text-anchor="middle" font-weight="600">Real-Time</text>

    <!-- Pill 4: macOS -->
    <rect x="770" y="350" width="230" height="50" rx="25" fill="#26262b" stroke="#404045" stroke-width="1"/>
    <text x="885" y="383" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#ff9933" text-anchor="middle" font-weight="600">macOS 14+ Native</text>
  </g>

  <!-- Large Quote Mark or Visual Element -->
  <text x="600" y="510" font-family="Georgia, serif" font-size="120" fill="#26262b" text-anchor="middle">"</text>

  <!-- Bottom Info -->
  <text x="600" y="565" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666673" text-anchor="middle">Powered by OpenAI Whisper • Menu Bar App • Open Source</text>
</svg>
