<svg width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1600" height="900" fill="#14141a"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1e1e24" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Main Title -->
  <text x="100" y="150" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="bold" fill="#f2f2f7">MacTalk</text>

  <!-- Subtitle -->
  <text x="100" y="200" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9999a6">Privacy-First Voice Transcription for macOS</text>

  <!-- Features List -->
  <text x="100" y="270" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#80808c">● Real-time transcription with Whisper</text>
  <text x="100" y="305" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#80808c">● 100% local processing, zero cloud</text>
  <text x="100" y="340" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#80808c">● Metal-accelerated on Apple Silicon</text>
  <text x="100" y="375" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#80808c">● Menu bar integration, global hotkeys</text>

  <!-- HUD Window Mockup -->
  <g id="hud-window">
    <!-- HUD Background -->
    <rect x="950" y="200" width="550" height="260" rx="12" fill="#26262b" stroke="#404045" stroke-width="2"/>

    <!-- HUD Title Bar -->
    <text x="975" y="235" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#cccccode">MacTalk</text>

    <!-- Audio Meters -->
    <text x="975" y="285" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#808085">MIC</text>
    <rect x="1030" y="273" width="270" height="12" fill="#33b34d"/>

    <text x="975" y="320" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#808085">APP</text>
    <rect x="1030" y="308" width="150" height="12" fill="#33b34d"/>

    <!-- Live Transcript -->
    <text x="975" y="365" font-family="'Courier New', monospace" font-size="15" fill="#e5e5ea">This is real-time transcription</text>
    <text x="975" y="390" font-family="'Courier New', monospace" font-size="15" fill="#e5e5ea">powered by Whisper running</text>
    <text x="975" y="415" font-family="'Courier New', monospace" font-size="15" fill="#e5e5ea">locally on your Mac...</text>

    <!-- Stop Button -->
    <rect x="1370" y="410" width="110" height="36" rx="6" fill="#cc3333"/>
    <text x="1400" y="433" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Stop</text>
  </g>

  <!-- Menu Bar Mockup (Top Right) -->
  <g id="menubar">
    <rect x="1380" y="30" width="190" height="40" fill="#333338"/>
    <text x="1395" y="57" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#e5e5ea">🎙️ MacTalk</text>
    <!-- Recording Indicator -->
    <circle cx="1545" cy="50" r="6" fill="#e53333"/>
  </g>

  <!-- Bottom Status Bar -->
  <text x="100" y="840" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#666673">Model: small-q5_0  •  Language: English  •  Metal Acceleration: Active</text>

  <!-- Version Info -->
  <text x="1470" y="870" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#4d4d52">macOS 14.0+</text>
</svg>
