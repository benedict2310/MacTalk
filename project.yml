name: MacTalk
options:
  bundleIdPrefix: com.mactalk
  deploymentTarget:
    macOS: "26.4"
  developmentLanguage: en

settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  MACOSX_DEPLOYMENT_TARGET: "26.4"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.7.11

targets:
  MacTalk:
    type: application
    platform: macOS
    sources:
      - path: MacTalk/MacTalk
        excludes:
          - "*.xcodeproj"
          - "*.xcworkspace"
    info:
      path: MacTalk/MacTalk/Info.plist
      properties:
        CFBundleIdentifier: com.mactalk.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.1.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: "MacTalk needs microphone access to transcribe your voice."
        NSAppleEventsUsageDescription: "MacTalk needs accessibility permission to auto-paste transcriptions."
        LSApplicationCategoryType: "public.app-category.productivity"
        NSHumanReadableCopyright: "Copyright © 2025 MacTalk Development Team"
        NSPrincipalClass: "NSApplication"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mactalk.app
      INFOPLIST_FILE: MacTalk/MacTalk/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_OBJC_BRIDGING_HEADER: MacTalk/MacTalk/Whisper/WhisperBridge.h
      HEADER_SEARCH_PATHS:
        - $(PROJECT_DIR)/Vendor/whisper.cpp
        - $(PROJECT_DIR)/Vendor/whisper.cpp/include
        - $(PROJECT_DIR)/Vendor/whisper.cpp/src
        - $(PROJECT_DIR)/Vendor/whisper.cpp/ggml/include
      LIBRARY_SEARCH_PATHS:
        - $(PROJECT_DIR)/Vendor/whisper.cpp/build/src
        - $(PROJECT_DIR)/Vendor/whisper.cpp/build/ggml/src
      OTHER_LDFLAGS:
        - -lwhisper
        - -framework Accelerate
        - -framework Metal
        - -framework Foundation
        - -framework AVFoundation
        - -framework AppKit
        - -framework ScreenCaptureKit
      LD_RUNPATH_SEARCH_PATHS:
        - "@executable_path/../Frameworks"
        - "@loader_path/../Frameworks"
      ENABLE_HARDENED_RUNTIME: NO
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: "9SXL4GJ4TZ"
      GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: Foundation.framework
      - sdk: AVFoundation.framework
      - sdk: AppKit.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: CoreML.framework
      - package: FluidAudio
    postBuildScripts:
      - name: Copy Whisper Libraries
        inputFiles:
          - $(PROJECT_DIR)/Vendor/whisper.cpp/build/src/libwhisper.1.dylib
          - $(PROJECT_DIR)/Vendor/whisper.cpp/build/ggml/src/libggml.dylib
          - $(PROJECT_DIR)/Vendor/whisper.cpp/build/ggml/src/libggml-base.dylib
          - $(PROJECT_DIR)/Vendor/whisper.cpp/build/ggml/src/libggml-cpu.dylib
          - $(PROJECT_DIR)/Vendor/whisper.cpp/build/ggml/src/ggml-metal/libggml-metal.dylib
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libwhisper.1.dylib
          - $(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libggml.dylib
          - $(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libggml-base.dylib
          - $(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libggml-cpu.dylib
          - $(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libggml-metal.dylib
        script: |
          # Create Frameworks directory
          mkdir -p "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"

          # Copy whisper.cpp libraries
          cp -f "${PROJECT_DIR}/Vendor/whisper.cpp/build/src/libwhisper.1.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/" || true
          cp -f "${PROJECT_DIR}/Vendor/whisper.cpp/build/ggml/src/libggml.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/" || true
          cp -f "${PROJECT_DIR}/Vendor/whisper.cpp/build/ggml/src/libggml-base.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/" || true
          cp -f "${PROJECT_DIR}/Vendor/whisper.cpp/build/ggml/src/libggml-cpu.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/" || true
          cp -f "${PROJECT_DIR}/Vendor/whisper.cpp/build/ggml/src/ggml-metal/libggml-metal.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/" || true

          # Fix install names
          install_name_tool -id "@rpath/libwhisper.1.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libwhisper.1.dylib" || true
          install_name_tool -id "@rpath/libggml.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libggml.dylib" || true
          install_name_tool -id "@rpath/libggml-base.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libggml-base.dylib" || true
          install_name_tool -id "@rpath/libggml-cpu.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libggml-cpu.dylib" || true
          install_name_tool -id "@rpath/libggml-metal.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libggml-metal.dylib" || true

          # Update dependencies in libwhisper
          install_name_tool -change "@rpath/libggml.dylib" "@rpath/libggml.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libwhisper.1.dylib" || true

          # Fix library references in the debug dylib (CRITICAL for macOS 26)
          if [ -f "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/MacOS/${PRODUCT_NAME}.debug.dylib" ]; then
            install_name_tool -change "@rpath/libwhisper.1.dylib" "@loader_path/../Frameworks/libwhisper.1.dylib" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/MacOS/${PRODUCT_NAME}.debug.dylib" || true
            install_name_tool -change "@rpath/libggml.dylib" "@loader_path/../Frameworks/libggml.dylib" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/MacOS/${PRODUCT_NAME}.debug.dylib" || true
            install_name_tool -change "@rpath/libggml-base.dylib" "@loader_path/../Frameworks/libggml-base.dylib" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/MacOS/${PRODUCT_NAME}.debug.dylib" || true
            install_name_tool -change "@rpath/libggml-cpu.dylib" "@loader_path/../Frameworks/libggml-cpu.dylib" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/MacOS/${PRODUCT_NAME}.debug.dylib" || true
            install_name_tool -change "@rpath/libggml-metal.dylib" "@loader_path/../Frameworks/libggml-metal.dylib" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/MacOS/${PRODUCT_NAME}.debug.dylib" || true
            echo "Fixed library paths in ${PRODUCT_NAME}.debug.dylib"
          fi

          echo "Copied whisper libraries to ${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
      - name: Re-sign Libraries and App Bundle
        basedOnDependencyAnalysis: false
        runOnlyForDeploymentPostprocessing: false
        script: |
          #!/bin/bash
          # CRITICAL for macOS 26: Re-sign all dylibs to fix Team ID mismatch
          # This must run AFTER Xcode's CodeSign phase
          # IMPORTANT: Use same certificate as main app to preserve accessibility permissions across builds

          # Get the code signing identity from Xcode build settings
          SIGNING_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-Apple Development}"

          echo "🔐 [Post-Build] Re-signing whisper.cpp libraries with: $SIGNING_IDENTITY"

          # Re-sign all dylibs in Frameworks with same certificate as app
          for lib in "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"/*.dylib; do
            if [ -f "$lib" ]; then
              codesign --force --sign "$SIGNING_IDENTITY" "$lib" 2>&1 | grep -v "replacing existing signature" || true
              echo "   ✅ Signed: $(basename $lib)"
            fi
          done

          # Re-sign the app bundle with deep option using same certificate
          echo "🔐 [Post-Build] Re-signing app bundle with: $SIGNING_IDENTITY"
          codesign --force --deep --sign "$SIGNING_IDENTITY" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app" 2>&1 | grep -v "replacing existing signature" || true

          echo "✅ [Post-Build] Code signing complete with identity: $SIGNING_IDENTITY"

  MacTalkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MacTalk/MacTalkTests
    settings:
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MacTalk.app/Contents/MacOS/MacTalk"
      PRODUCT_BUNDLE_IDENTIFIER: com.mactalk.app.tests
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MacTalk

schemes:
  MacTalk:
    build:
      targets:
        MacTalk: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MacTalkTests
      # Thread Sanitizer disabled by default for faster test runs.
      # Enable with: xcodebuild test -enableThreadSanitizer YES
      # Or use the MacTalk-TSan scheme below.
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  # Thread Sanitizer scheme for concurrency validation (S.02.3a)
  MacTalk-TSan:
    build:
      targets:
        MacTalk: all
    run:
      config: Debug
      environmentVariables:
        TSAN_OPTIONS: "halt_on_error=0"
    test:
      config: Debug
      targets:
        - MacTalkTests
      diagnostics:
        threadSanitizer: true
      environmentVariables:
        TSAN_OPTIONS: "suppressions=$(PROJECT_DIR)/tsan_suppressions.txt:halt_on_error=0"
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
