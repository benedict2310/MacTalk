name: MacTalk
options:
  bundleIdPrefix: com.mactalk
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

settings:
  SWIFT_VERSION: "5.0"
  MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  MacTalk:
    type: application
    platform: macOS
    sources:
      - path: MacTalk/MacTalk
        excludes:
          - "*.xcodeproj"
          - "*.xcworkspace"
    info:
      path: MacTalk/MacTalk/Info.plist
      properties:
        CFBundleIdentifier: com.mactalk.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: "MacTalk needs microphone access to transcribe your voice."
        NSAppleEventsUsageDescription: "MacTalk needs accessibility permission to auto-paste transcriptions."
        LSApplicationCategoryType: "public.app-category.productivity"
        NSHumanReadableCopyright: "Copyright © 2025 MacTalk Development Team"
        NSMainNibFile: "MainMenu"
        NSPrincipalClass: "NSApplication"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mactalk.app
      INFOPLIST_FILE: MacTalk/MacTalk/Info.plist
      SWIFT_OBJC_BRIDGING_HEADER: MacTalk/MacTalk/Whisper/WhisperBridge.h
      HEADER_SEARCH_PATHS:
        - $(PROJECT_DIR)/Vendor/whisper.cpp
        - $(PROJECT_DIR)/Vendor/whisper.cpp/include
        - $(PROJECT_DIR)/Vendor/whisper.cpp/src
        - $(PROJECT_DIR)/Vendor/whisper.cpp/ggml/include
      LIBRARY_SEARCH_PATHS:
        - $(PROJECT_DIR)/Vendor/whisper.cpp/build/src
        - $(PROJECT_DIR)/Vendor/whisper.cpp/build/ggml/src
      OTHER_LDFLAGS:
        - -lwhisper
        - -framework Accelerate
        - -framework Metal
        - -framework Foundation
        - -framework AVFoundation
        - -framework AppKit
        - -framework ScreenCaptureKit
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: Foundation.framework
      - sdk: AVFoundation.framework
      - sdk: AppKit.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: libc++.tbd

  MacTalkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MacTalk/MacTalkTests
    settings:
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MacTalk.app/Contents/MacOS/MacTalk"
      PRODUCT_BUNDLE_IDENTIFIER: com.mactalk.app.tests
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MacTalk

schemes:
  MacTalk:
    build:
      targets:
        MacTalk: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MacTalkTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
