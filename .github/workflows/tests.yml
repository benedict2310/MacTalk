name: MacTalk CI/CD

on:
  push:
    branches: [ main, develop, 'feature/**', 'claude/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('MacTalk.xcodeproj/**') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project MacTalk/MacTalk.xcodeproj \
            -scheme MacTalk \
            -destination 'platform=macOS,arch=arm64' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults \
            | tee xcodebuild-test.log \
            | xcpretty --color --report html --output tests-report.html

      - name: Generate coverage report
        if: always()
        run: |
          xcrun xccov view --report --json TestResults.xcresult > coverage.json
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat coverage.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            TestResults.xcresult
            tests-report.html
            xcodebuild-test.log
            coverage.json

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.json
          fail_ci_if_error: false

  lint:
    name: Swift Lint
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint lint --reporter github-actions-logging || true

  build:
    name: Build Release
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build for Release
        run: |
          xcodebuild build \
            -project MacTalk/MacTalk.xcodeproj \
            -scheme MacTalk \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            | tee xcodebuild-build.log \
            | xcpretty --color

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build-log
          path: xcodebuild-build.log

  performance:
    name: Performance Checks
    runs-on: macos-14
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Run performance tests
        run: |
          xcodebuild test \
            -project MacTalk/MacTalk.xcodeproj \
            -scheme MacTalk \
            -destination 'platform=macOS,arch=arm64' \
            -only-testing:MacTalkTests/RingBufferTests/testPushPerformance \
            -only-testing:MacTalkTests/AudioMixerTests/testConversionPerformance \
            -only-testing:MacTalkTests/AudioLevelMonitorTests/testUpdatePerformance \
            | tee performance-tests.log \
            | xcpretty --color

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: performance-tests.log

  security:
    name: Security Scan
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          # Check for hardcoded secrets
          echo "Scanning for hardcoded secrets..."
          ! grep -r "password\s*=\s*\"" MacTalk/MacTalk/*.swift || exit 1
          ! grep -r "api_key\s*=\s*\"" MacTalk/MacTalk/*.swift || exit 1
          ! grep -r "secret\s*=\s*\"" MacTalk/MacTalk/*.swift || exit 1
          echo "No hardcoded secrets found."

      - name: Check permissions
        run: |
          echo "Checking Info.plist for required permissions..."
          if [ -f "MacTalk/MacTalk/Info.plist" ]; then
            plutil -lint MacTalk/MacTalk/Info.plist
            grep -q "NSMicrophoneUsageDescription" MacTalk/MacTalk/Info.plist || echo "Warning: Missing microphone permission description"
            echo "Permissions check complete."
          fi

  documentation:
    name: Documentation Check
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check documentation
        run: |
          echo "Checking for required documentation files..."
          test -f README.md && echo "✅ README.md found"
          test -f docs/ARCHITECTURE.md && echo "✅ ARCHITECTURE.md found"
          test -f docs/ROADMAP.md && echo "✅ ROADMAP.md found"
          test -f docs/PROGRESS.md && echo "✅ PROGRESS.md found"
          test -f docs/TESTING.md && echo "✅ TESTING.md found"
          test -f docs/TEST_COVERAGE.md && echo "✅ TEST_COVERAGE.md found"
          test -f docs/PROFILING.md && echo "✅ PROFILING.md found"
          echo "Documentation check complete."

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, lint, build, security, documentation]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## MacTalk CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Documentation: ${{ needs.documentation.result }}" >> $GITHUB_STEP_SUMMARY
